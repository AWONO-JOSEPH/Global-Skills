services:
  - type: web
    name: global-skills-api
    env: docker
    rootDir: Backend
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://global-skills.onrender.com
      - key: APP_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_SSLMODE
        value: require
      - key: DB_HOST
        value: dpg-d719mq94tr6s73e8kpv0-a
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        value: globalskillsdb_wt3x
      - key: DB_USERNAME
        value: joseph
      - key: DB_PASSWORD
        value: gbtMynlQTtSQjw14gI6CACqppwy0gYnJ
      - key: DATABASE_URL
        value: postgresql://joseph:gbtMynlQTtSQjw14gI6CACqppwy0gYnJ@dpg-d719mq94tr6s73e8kpv0-a/globalskillsdb_wt3x

  - type: web
    name: global-skills-frontend
    env: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://global-skills.onrender.com
