services:
  - type: web
    name: global-skills-api
    env: docker
    rootDir: Backend
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_SSLMODE
        value: require
      - key: DATABASE_URL
        fromDatabase:
          name: global-skills-db
          property: connectionString

  - type: web
    name: global-skills-frontend
    env: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://global-skills-api.onrender.com

databases:
  - name: global-skills-db
    plan: free
